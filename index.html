<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✨ Mega Calc Pro ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ========== CSS VARIABLES / THEMES ========== */
:root {
  --bg1: #0a0a12; --bg2: #0d0221; --bg3: #1a0533;
  --calc-bg: rgba(10,10,18,0.75);
  --calc-border: rgba(0,255,136,0.08);
  --glow-1: rgba(0,255,136,0.2); --glow-2: rgba(100,200,255,0.15); --glow-3: rgba(180,100,255,0.15);
  --accent: #00ff88; --accent2: #80d8ff; --accent3: #c792ea;
  --num-color: #80d8ff; --op-color: #c792ea; --fn-color: #80d8ff;
  --disp-bg: rgba(0,0,0,0.5);
  --disp-border: rgba(0,255,136,0.06);
  --text-primary: #e6f1ff; --text-dim: rgba(0,255,136,0.3);
  --btn-num-bg: linear-gradient(145deg,rgba(0,255,136,0.08),rgba(0,255,136,0.02));
  --btn-op-bg: linear-gradient(145deg,rgba(180,100,255,0.12),rgba(180,100,255,0.03));
  --btn-fn-bg: linear-gradient(145deg,rgba(0,170,255,0.1),rgba(0,170,255,0.03));
  --btn-clear-bg: linear-gradient(135deg,#ff3d6b,#cc0044);
  --btn-eq-bg: linear-gradient(135deg,#00ff88,#00cc6a,#00aaff);
  --btn-shadow: 0 4px 0 rgba(0,0,0,0.4);
  --moon-bg: radial-gradient(circle at 35% 35%, #00ff88, #00cc6a);
  --moon-shadow: rgba(0,255,136,0.15);
  --petal-color: #00ff88 0%, #00cc6a 40%, #009955 100%;
  --ripple: rgba(0,255,136,0.2);
  --scrollbar: rgba(0,255,136,0.1);
  --mascot-filter: none;
}

.theme-pastel {
  --bg1: #1a0a2e; --bg2: #0d0221; --bg3: #1a0533;
  --calc-bg: rgba(20,10,40,0.7);
  --calc-border: rgba(255,255,255,0.07);
  --glow-1: rgba(255,107,138,0.3); --glow-2: rgba(180,100,255,0.3); --glow-3: rgba(100,200,255,0.3);
  --accent: #ff6b8a; --accent2: #ffb7c5; --accent3: #c792ea;
  --num-color: #ffb7c5; --op-color: #c792ea; --fn-color: #80d8ff;
  --disp-bg: rgba(10,5,25,0.6);
  --disp-border: rgba(255,255,255,0.05);
  --text-primary: #e6f1ff; --text-dim: rgba(200,180,230,0.45);
  --btn-num-bg: linear-gradient(145deg,rgba(255,183,197,0.15),rgba(255,183,197,0.05));
  --btn-op-bg: linear-gradient(145deg,rgba(180,100,255,0.15),rgba(180,100,255,0.05));
  --btn-fn-bg: linear-gradient(145deg,rgba(128,216,255,0.12),rgba(128,216,255,0.04));
  --btn-clear-bg: linear-gradient(135deg,#ff6b8a,#ff3d6b);
  --btn-eq-bg: linear-gradient(135deg,#ff6b8a,#c792ea,#80d8ff);
  --btn-shadow: 0 4px 0 rgba(0,0,0,0.3);
  --moon-bg: radial-gradient(circle at 35% 35%, #ffecb0, #f5d76e);
  --moon-shadow: rgba(245,215,110,0.3);
  --petal-color: #ffb7c5 0%, #ff8fa3 40%, #ff6b8a 100%;
  --ripple: rgba(255,255,255,0.35);
  --scrollbar: rgba(255,255,255,0.1);
  --mascot-filter: none;
}

.theme-matrix {
  --bg1: #000; --bg2: #001a00; --bg3: #000d00;
  --calc-bg: rgba(0,10,0,0.85);
  --calc-border: rgba(0,255,0,0.15);
  --glow-1: rgba(0,255,0,0.3); --glow-2: rgba(0,200,0,0.2); --glow-3: rgba(0,255,0,0.1);
  --accent: #00ff00; --accent2: #00ff00; --accent3: #00ff00;
  --num-color: #00ff00; --op-color: #00ff00; --fn-color: #00ff00;
  --disp-bg: rgba(0,20,0,0.7);
  --disp-border: rgba(0,255,0,0.1);
  --text-primary: #00ff00; --text-dim: rgba(0,255,0,0.3);
  --btn-num-bg: linear-gradient(145deg,rgba(0,255,0,0.08),rgba(0,255,0,0.02));
  --btn-op-bg: linear-gradient(145deg,rgba(0,255,0,0.1),rgba(0,255,0,0.03));
  --btn-fn-bg: linear-gradient(145deg,rgba(0,255,0,0.06),rgba(0,255,0,0.02));
  --btn-clear-bg: linear-gradient(135deg,#003300,#002200);
  --btn-eq-bg: linear-gradient(135deg,#00ff00,#00cc00,#009900);
  --btn-shadow: 0 4px 0 rgba(0,0,0,0.6);
  --moon-bg: radial-gradient(circle at 35% 35%, #00ff00, #00cc00);
  --moon-shadow: rgba(0,255,0,0.15);
  --petal-color: #00ff00 0%, #00cc00 40%, #009900 100%;
  --ripple: rgba(0,255,0,0.2);
  --scrollbar: rgba(0,255,0,0.1);
  --mascot-filter: hue-rotate(120deg);
}

.theme-terminal {
  --bg1: #0c0c0c; --bg2: #0c0c0c; --bg3: #0c0c0c;
  --calc-bg: rgba(12,12,12,0.95);
  --calc-border: rgba(204,204,204,0.15);
  --glow-1: rgba(204,204,204,0.1); --glow-2: rgba(204,204,204,0.1); --glow-3: rgba(204,204,204,0.1);
  --accent: #cccccc; --accent2: #cccccc; --accent3: #cccccc;
  --num-color: #cccccc; --op-color: #cccccc; --fn-color: #999999;
  --disp-bg: #000;
  --disp-border: rgba(204,204,204,0.1);
  --text-primary: #cccccc; --text-dim: rgba(204,204,204,0.3);
  --btn-num-bg: #1a1a1a; --btn-op-bg: #1a1a1a; --btn-fn-bg: #1a1a1a;
  --btn-clear-bg: #330000; --btn-eq-bg: #cccccc;
  --btn-shadow: 0 4px 0 #000;
  --moon-bg: radial-gradient(circle at 35% 35%, #555, #333);
  --moon-shadow: rgba(200,200,200,0.1);
  --petal-color: #444 0%, #333 40%, #222 100%;
  --ripple: rgba(255,255,255,0.08);
  --scrollbar: rgba(204,204,204,0.1);
  --mascot-filter: grayscale(1);
}

.theme-light {
  --bg1: #f0f0f5; --bg2: #e8e4f0; --bg3: #dddae8;
  --calc-bg: rgba(255,255,255,0.75);
  --calc-border: rgba(0,0,0,0.08);
  --glow-1: rgba(100,100,200,0.1); --glow-2: rgba(100,100,200,0.08); --glow-3: rgba(100,100,200,0.08);
  --accent: #6c63ff; --accent2: #6c63ff; --accent3: #6c63ff;
  --num-color: #333; --op-color: #6c63ff; --fn-color: #666;
  --disp-bg: rgba(255,255,255,0.8);
  --disp-border: rgba(0,0,0,0.06);
  --text-primary: #1a1a2e; --text-dim: rgba(0,0,0,0.3);
  --btn-num-bg: #e8e8f0; --btn-op-bg: #ddd8f5; --btn-fn-bg: #e8e8f0;
  --btn-clear-bg: linear-gradient(135deg,#ff6b8a,#ff3d6b);
  --btn-eq-bg: linear-gradient(135deg,#6c63ff,#5a52d5);
  --btn-shadow: 0 4px 0 rgba(0,0,0,0.1);
  --moon-bg: radial-gradient(circle at 35% 35%, #ffd700, #f0c000);
  --moon-shadow: rgba(255,215,0,0.3);
  --petal-color: #ffb7c5 0%, #ff8fa3 40%, #ff6b8a 100%;
  --ripple: rgba(0,0,0,0.08);
  --scrollbar: rgba(0,0,0,0.1);
  --mascot-filter: none;
  --btn-eq-color: white;
}

.theme-terminal .btn-equals { color: #000; }
.theme-light .btn-equals { color: white; }

/* ========== GLOBAL ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg1);overflow:hidden;transition:background .5s;
  font-family:'Nunito','Segoe UI',sans-serif;
}

/* ========== DRAGGABLE ========== */
.calculator-wrapper{
  position:absolute;z-index:5;cursor:grab;user-select:none;
  transition:opacity .2s;
}
.calculator-wrapper:active{cursor:grabbing}

/* ========== BACKGROUND ========== */
.bg{position:fixed;inset:0;z-index:-3;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3),var(--bg1));background-size:400% 400%;animation:skyShift 15s ease infinite;transition:background .5s}
@keyframes skyShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.coderain-container{position:fixed;inset:0;z-index:-2;overflow:hidden;opacity:.1;pointer-events:none}
.code-drop{position:absolute;top:-20px;font-family:'Fira Code',monospace;font-size:14px;font-weight:600;color:var(--accent);writing-mode:vertical-lr;animation:codeFall var(--cd-dur) linear infinite;animation-delay:var(--cd-delay);text-shadow:0 0 6px rgba(0,255,136,.15);white-space:nowrap;user-select:none}
@keyframes codeFall{0%{transform:translateY(-100%);opacity:0}5%{opacity:.6}90%{opacity:.4}100%{transform:translateY(105vh);opacity:0}}
.stars-container{position:fixed;inset:0;z-index:-1;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;pointer-events:none}
@keyframes twinkle{0%{opacity:.15;transform:scale(.8)}100%{opacity:.7;transform:scale(1.2)}}
.moon{position:fixed;top:35px;right:55px;z-index:-1;width:80px;height:80px;border-radius:50%;background:var(--moon-bg);box-shadow:0 0 60px var(--moon-shadow),0 0 120px rgba(0,0,0,.05);animation:moonGlow 4s ease-in-out infinite alternate;transition:background .5s,box-shadow .5s}
.moon::before{content:'';position:absolute;top:-6px;left:-6px;width:80px;height:80px;border-radius:50%;background:var(--bg1);transform:translate(16px,-4px);transition:background .5s}
@keyframes moonGlow{0%{box-shadow:0 0 60px var(--moon-shadow),0 0 120px rgba(0,0,0,.05)}100%{box-shadow:0 0 80px var(--moon-shadow),0 0 160px var(--moon-shadow)}}
.petal-container{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.3}
.petal{position:absolute;width:16px;height:16px;top:-30px;opacity:.5;animation:petalFall var(--fall-dur) linear infinite;animation-delay:var(--delay)}
.petal::before{content:'';display:block;width:100%;height:100%;background:radial-gradient(ellipse at 30% 30%,var(--petal-color));border-radius:50% 0 50% 0;transform:rotate(45deg);animation:petalSpin var(--spin-dur) ease-in-out infinite alternate}
@keyframes petalFall{0%{transform:translateY(-30px) translateX(0);opacity:0}5%{opacity:.5}90%{opacity:.3}100%{transform:translateY(105vh) translateX(80px);opacity:0}}
@keyframes petalSpin{0%{transform:rotate(35deg) scale(1)}100%{transform:rotate(55deg) scale(1.1)}}

/* ========== CALCULATOR ========== */
.calculator{
  position:relative;z-index:2;background:var(--calc-bg);backdrop-filter:blur(24px);
  border-radius:28px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  width:400px;border:1px solid var(--calc-border);transform-style:preserve-3d;perspective:1000px;
  transition:transform .08s ease,box-shadow .3s,background .5s,border .5s;
}
.calculator::before{
  content:'';position:absolute;inset:-2px;border-radius:30px;z-index:-1;
  background:linear-gradient(135deg,var(--glow-1),var(--glow-2),var(--glow-3),var(--glow-1));
  background-size:300% 300%;animation:borderGlow 8s ease infinite;opacity:.5;
  transition:background .5s,opacity .5s;
}
@keyframes borderGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ========== MASCOT ========== */
.mascot{
  position:absolute;top:-42px;left:10px;font-size:32px;line-height:1;
  animation:mascotBounce 2s ease-in-out infinite;transition:filter .5s;
  filter:var(--mascot-filter);pointer-events:none;z-index:10;
}
.mascot.dance{animation:mascotDance .4s ease}
@keyframes mascotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes mascotDance{0%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-5px) rotate(-10deg)}50%{transform:translateX(5px) rotate(10deg)}75%{transform:translateX(-3px) rotate(-5deg)}100%{transform:translateX(0) rotate(0deg)}}

/* ========== TABS ========== */
.tabs{display:flex;gap:3px;margin-bottom:10px}
.tab-btn{padding:5px 12px;font-size:10px;font-weight:700;border:none;border-radius:8px;cursor:pointer;
  font-family:'Fira Code',monospace;background:rgba(255,255,255,.03);color:var(--text-dim);
  transition:all .2s;letter-spacing:.3px;
}
.tab-btn:hover{background:rgba(255,255,255,.06);color:var(--accent)}
.tab-btn.active{background:rgba(255,255,255,.08);color:var(--accent);box-shadow:inset 0 0 12px rgba(0,0,0,.2)}

/* ========== THEME PICKER ========== */
.theme-picker{position:absolute;top:8px;right:10px;z-index:6;display:flex;gap:3px}
.theme-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.1);cursor:pointer;transition:all .2s}
.theme-dot:hover{transform:scale(1.3);border-color:rgba(255,255,255,.3)}
.theme-dot.active{border-color:white;box-shadow:0 0 8px rgba(255,255,255,.2)}

/* ========== STATUS BAR ========== */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 4px 8px;
  font-family:'Fira Code',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.3px;
}
.status-bar .mode{color:var(--text-dim);font-weight:600}
.status-bar .mode span{color:var(--accent)}
.mode-switcher{display:flex;gap:2px}
.mode-btn{background:none;border:none;font-family:'Fira Code',monospace;font-size:8px;font-weight:600;
  color:var(--text-dim);cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .2s}
.mode-btn:hover{color:var(--accent);background:rgba(255,255,255,.04)}

/* ========== DISPLAY ========== */
.display{background:var(--disp-bg);border-radius:16px;padding:14px 18px;margin-bottom:4px;
  min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;
  word-break:break-all;border:1px solid var(--disp-border);position:relative;overflow:hidden;
  transition:background .5s,border .5s;
}
.display::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 2px,rgba(255,255,255,.008) 4px);pointer-events:none}
.display::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),transparent);transition:background .5s}
.display .filepath{font-family:'Fira Code',monospace;font-size:8px;color:var(--text-dim);text-align:left;padding-bottom:3px;letter-spacing:.2px;opacity:.4}
.display .expression{font-family:'Fira Code',monospace;color:var(--text-dim);font-size:12px;min-height:18px;font-weight:600;letter-spacing:.2px}
.display .result{font-family:'Fira Code',monospace;font-size:30px;font-weight:700;letter-spacing:-.5px;color:var(--text-primary);transition:all .15s;line-height:1.2}
.display .result.pop{animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.92) translateY(3px);opacity:.4}100%{transform:scale(1) translateY(0);opacity:1}}
.terminal-cursor{display:inline-block;width:7px;height:14px;background:var(--accent);margin-left:2px;animation:blink 1s step-end infinite;vertical-align:middle;opacity:.6}
@keyframes blink{50%{opacity:0}}

/* ========== GRAPH ========== */
.graph-container{display:none;margin-bottom:8px}
.graph-container.open{display:block}
.graph-container canvas{width:100%;height:160px;border-radius:12px;background:rgba(0,0,0,.4);border:1px solid var(--disp-border);display:block}
.graph-input-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.graph-input-row input{flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--disp-border);background:var(--disp-bg);color:var(--text-primary);font-family:'Fira Code',monospace;font-size:12px;outline:none}
.graph-input-row input:focus{border-color:var(--accent)}
.graph-input-row button{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Fira Code',monospace;background:var(--accent);color:var(--bg1);transition:all .2s}
.graph-input-row button:hover{opacity:.85}

/* ========== CONVERTER ========== */
.converter-panel{display:none;margin-bottom:8px}
.converter-panel.open{display:block}
.converter-panel select,.converter-panel input{padding:6px 10px;border-radius:8px;border:1px solid var(--disp-border);background:var(--disp-bg);color:var(--text-primary);font-family:'Fira Code',monospace;font-size:11px;outline:none;width:100%}
.converter-panel select option{background:var(--bg1)}
.converter-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-top:6px}
.converter-grid input{width:100%}
.converter-grid .swap-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:18px;padding:4px;transition:transform .2s}
.converter-grid .swap-btn:hover{transform:rotate(180deg)}
.converter-type select{font-size:10px;padding:4px 8px;margin-bottom:6px}

/* ========== HISTORY ========== */
.history-toggle{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-dim);font-size:10px;font-weight:700;cursor:pointer;padding:5px 0 6px;transition:color .2s;font-family:'Fira Code',monospace;letter-spacing:.3px;width:fit-content}
.history-toggle:hover{color:var(--accent)}
.history-toggle .icon{font-size:9px;transition:transform .3s;display:inline-block}
.history-toggle.open .icon{transform:rotate(180deg)}
.history-panel{max-height:0;overflow-y:auto;transition:max-height .35s,opacity .3s;opacity:0;font-family:'Fira Code',monospace;scrollbar-width:thin;scrollbar-color:var(--scrollbar) transparent}
.history-panel.open{max-height:110px;padding:3px 0 8px;opacity:1}
.history-panel::-webkit-scrollbar{width:4px}
.history-panel::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;margin-bottom:2px;background:rgba(255,255,255,.02);border-radius:6px;font-size:11px;color:var(--text-dim);font-weight:600;animation:histSlide .25s ease;cursor:pointer;transition:background .2s;border-left:2px solid transparent}
.history-item:hover{background:rgba(255,255,255,.04);border-left-color:var(--accent)}
.history-item .h-expr{color:var(--text-dim);opacity:.6}
.history-item .h-result{color:var(--accent);font-weight:700}
@keyframes histSlide{0%{transform:translateX(-12px);opacity:0}100%{transform:translateX(0);opacity:1}}
.history-clear{background:none;border:none;color:var(--accent);font-family:'Fira Code',monospace;font-size:9px;font-weight:700;cursor:pointer;padding:2px 6px;transition:color .2s;display:none;opacity:.4}
.history-clear:hover{opacity:1}

/* ========== MEMORY ========== */
.memory-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:5px}
.btn-memory{padding:6px 0;font-size:10px;font-weight:700;border:none;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.02);color:var(--text-dim);transition:all .2s;font-family:'Fira Code',monospace;letter-spacing:.3px}
.btn-memory:hover{background:rgba(255,255,255,.05);color:var(--accent)}
.btn-memory:active{transform:scale(.93)}
.btn-memory.has-memory{color:var(--accent);box-shadow:inset 0 0 10px rgba(0,0,0,.2)}

/* ========== BUTTONS GRID ========== */
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.btn-extra{grid-column:span 2}

button{position:relative;padding:14px 0;font-size:17px;border:none;border-radius:13px;cursor:pointer;font-weight:700;overflow:hidden;transition:transform .08s,box-shadow .2s,background .2s,color .2s;user-select:none;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif}
button:active{transform:scale(.9)}
.ripple{position:absolute;border-radius:50%;background:var(--ripple);transform:scale(0);animation:rippleAnim .5s ease-out;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
.glow-trail{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);pointer-events:none;transform:translate(-50%,-50%);transition:left .05s,top .05s;width:60px;height:60px;opacity:0}
button:hover .glow-trail{opacity:1}

.btn-number{background:var(--btn-num-bg);color:var(--num-color);box-shadow:var(--btn-shadow),inset 0 1px 0 rgba(255,255,255,.04);transition:background .5s,color .5s,box-shadow .5s}
.btn-number:hover{filter:brightness(1.15);box-shadow:var(--btn-shadow),inset 0 1px 0 rgba(255,255,255,.08)}
.btn-number:active{box-shadow:0 1px 0 rgba(0,0,0,.4)}

.btn-operator{background:var(--btn-op-bg);color:var(--op-color);box-shadow:var(--btn-shadow),inset 0 1px 0 rgba(255,255,255,.04);font-family:'Fira Code',monospace;transition:background .5s,color .5s,box-shadow .5s}
.btn-operator:hover{filter:brightness(1.15)}
.btn-operator:active{box-shadow:0 1px 0 rgba(0,0,0,.4)}
.btn-operator.active{background:rgba(180,100,255,.25);box-shadow:0 0 20px rgba(180,100,255,.15);color:var(--accent3)}

.btn-function{background:var(--btn-fn-bg);color:var(--fn-color);box-shadow:var(--btn-shadow),inset 0 1px 0 rgba(255,255,255,.04);transition:background .5s,color .5s,box-shadow .5s}
.btn-function:hover{filter:brightness(1.15)}
.btn-function:active{box-shadow:0 1px 0 rgba(0,0,0,.4)}

.btn-clear{background:var(--btn-clear-bg);color:white;box-shadow:var(--btn-shadow);transition:background .5s,box-shadow .5s}
.btn-clear:hover{filter:brightness(1.15)}
.btn-clear:active{box-shadow:0 1px 0 rgba(0,0,0,.4)}

.btn-equals{background:var(--btn-eq-bg);color:var(--bg1);background-size:200% 200%;animation:eqPulse 3s ease-in-out infinite;box-shadow:var(--btn-shadow),0 0 15px rgba(0,0,0,.1);transition:background .5s,color .5s,box-shadow .5s}
@keyframes eqPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-equals:hover{filter:brightness(1.15)}
.btn-equals:active{box-shadow:0 1px 0 rgba(0,0,0,.4)}

/* ========== SHAKE ========== */
.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ========== CONFETTI ========== */
.confetti-container{position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden}
.confetti-piece{position:absolute;width:5px;height:5px;animation:confettiFall var(--c-dur) ease-in forwards;animation-delay:var(--c-delay)}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(720deg) scale(.3);opacity:0}}

/* ========== EXPORT MODAL ========== */
.export-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
.export-overlay.open{display:flex}
.export-modal{background:var(--calc-bg);border:1px solid var(--calc-border);border-radius:20px;padding:24px;width:380px;max-width:90vw}
.export-modal h3{color:var(--text-primary);font-size:16px;margin-bottom:12px}
.export-modal textarea{width:100%;height:100px;border-radius:10px;border:1px solid var(--disp-border);background:var(--disp-bg);color:var(--text-primary);font-family:'Fira Code',monospace;font-size:11px;padding:10px;resize:none;outline:none}
.export-modal .export-actions{display:flex;gap:8px;margin-top:10px}
.export-modal button{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s}
.export-modal .btn-copy{background:var(--accent);color:var(--bg1)}
.export-modal .btn-copy:hover{opacity:.85}
.export-modal .btn-close{background:rgba(255,255,255,.06);color:var(--text-primary)}
.export-modal .btn-close:hover{background:rgba(255,255,255,.1)}
.lang-select{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.lang-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--disp-border);background:none;color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;font-family:'Fira Code',monospace;transition:all .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.lang-btn.active{background:var(--accent);color:var(--bg1);border-color:var(--accent)}

/* ========== RESPONSIVE ========== */
@media(max-width:440px){
  .calculator{width:96vw;padding:14px;border-radius:22px}
  button{padding:12px 0;font-size:15px;border-radius:11px}
  .buttons{gap:6px}
  .memory-row{gap:4px}
  .btn-memory{font-size:8px;padding:4px 0}
  .display .result{font-size:24px}
  .moon{width:50px;height:50px;top:15px;right:15px}
  .moon::before{width:50px;height:50px;transform:translate(10px,-3px)}
  .display{padding:10px 12px;min-height:70px}
  .tabs{gap:2px}
  .tab-btn{padding:4px 8px;font-size:9px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="coderain-container" id="coderain"></div>
<div class="stars-container" id="stars"></div>
<div class="moon" id="moon"></div>
<div class="petal-container" id="petals"></div>
<div id="confettiContainer" class="confetti-container"></div>
<div class="export-overlay" id="exportOverlay"><div class="export-modal"><h3>📤 Export as Code</h3><div class="lang-select" id="langSelect"></div><textarea id="exportCode" readonly></textarea><div class="export-actions"><button class="btn-copy" id="exportCopy">📋 Copy</button><button class="btn-close" id="exportClose">Close</button></div></div></div>

<div class="calculator-wrapper" id="calcWrapper">
<div class="calculator" id="calculator">
  <!-- Theme dots -->
  <div class="theme-picker" id="themePicker"></div>

  <!-- Mascot -->
  <div class="mascot" id="mascot">🐱</div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="mode">MODE: <span id="modeDisplay">DEC</span></div>
    <div class="mode-switcher">
      <button class="mode-btn" data-mode="dec">DEC</button>
      <button class="mode-btn" data-mode="hex">HEX</button>
      <button class="mode-btn" data-mode="bin">BIN</button>
    </div>
  </div>

  <!-- Display -->
  <div class="display" id="display">
    <div class="filepath" id="filepath">// ~/calc</div>
    <div class="expression" id="expression">_</div>
    <div class="result" id="result">0<span class="terminal-cursor"></span></div>
  </div>

  <!-- Graph -->
  <div class="graph-container" id="graphContainer">
    <canvas id="graphCanvas" height="160"></canvas>
    <div class="graph-input-row">
      <input id="graphInput" placeholder="f(x) = " spellcheck="false">
      <button id="graphBtn">Plot</button>
    </div>
  </div>

  <!-- Converter -->
  <div class="converter-panel" id="converterPanel"></div>

  <!-- History -->
  <button class="history-toggle" id="historyToggle"><span class="icon">▾</span> // history.log</button>
  <div class="history-panel" id="historyPanel"></div>

  <!-- Memory -->
  <div class="memory-row">
    <button class="btn-memory" data-action="mc">MC</button>
    <button class="btn-memory" data-action="mr">MR</button>
    <button class="btn-memory" data-action="mplus">M+</button>
    <button class="btn-memory" data-action="mminus">M−</button>
  </div>

  <!-- Buttons container (populated by JS) -->
  <div class="buttons" id="buttonsContainer"></div>
</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const THEMES = ['default','pastel','matrix','terminal','light'];
const THEME_LABELS = {default:'💚',pastel:'🌸',matrix:'💾',terminal:'⬛',light:'☀️'};
const MASCOTS = ['🐱','🐰','🐼','🦊','🐸','🐙','🤖','👾','⭐','🌈'];
const LANGUAGES = [
  {id:'js',name:'JavaScript',comment:'//'},
  {id:'py',name:'Python',comment:'#'},
  {id:'rs',name:'Rust',comment:'//'},
  {id:'java',name:'Java',comment:'//'},
  {id:'cpp',name:'C++',comment:'//'},
  {id:'go',name:'Go',comment:'//'},
];
const TABS = [
  {id:'basic',label:'🧮 Calc'},
  {id:'sci',label:'🔬 Sci'},
  {id:'graph',label:'📈 Graph'},
  {id:'conv',label:'🔄 Convert'},
  {id:'prog',label:'💻 Prog'},
];

// ============================================================
// STATE
// ============================================================
let state = {
  currentInput: '0',
  previousInput: '',
  operator: null,
  shouldReset: false,
  expression: '',
  memory: 0,
  hasMemory: false,
  history: [],
  historyOpen: false,
  currentMode: 'dec',
  currentTab: 'basic',
  currentTheme: 'default',
  soundEnabled: true,
  undoStack: [],
  redoStack: [],
  mascotIndex: 0,
};

let audioCtx = null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

// ============================================================
// SOUND
// ============================================================
function playClick(){if(!state.soundEnabled)return;try{const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(1200,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(1600,ctx.currentTime+.04);g.gain.setValueAtTime(.025,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.06);o.start(ctx.currentTime);o.stop(ctx.currentTime+.06)}catch(e){}}
function playEquals(){if(!state.soundEnabled)return;try{const ctx=getAudioCtx();[880,1100,1320].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(f,ctx.currentTime+i*.06);g.gain.setValueAtTime(.015,ctx.currentTime+i*.06);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.06+.12);o.start(ctx.currentTime+i*.06);o.stop(ctx.currentTime+i*.06+.12)})}catch(e){}}
function playError(){if(!state.soundEnabled)return;try{const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(80,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(30,ctx.currentTime+.25);g.gain.setValueAtTime(.025,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);o.start(ctx.currentTime);o.stop(ctx.currentTime+.25)}catch(e){}}

// ============================================================
// UNDO / REDO
// ============================================================
function pushUndo(){
  state.undoStack.push({
    currentInput:state.currentInput,previousInput:state.previousInput,
    operator:state.operator,shouldReset:state.shouldReset,expression:state.expression
  });
  if(state.undoStack.length>50)state.undoStack.shift();
  state.redoStack=[];
}
function undo(){if(!state.undoStack.length)return;state.redoStack.push({currentInput:state.currentInput,previousInput:state.previousInput,operator:state.operator,shouldReset:state.shouldReset,expression:state.expression});const s=state.undoStack.pop();Object.assign(state,s);updateDisplay();playClick()}
function redo(){if(!state.redoStack.length)return;state.undoStack.push({currentInput:state.currentInput,previousInput:state.previousInput,operator:state.operator,shouldReset:state.shouldReset,expression:state.expression});const s=state.redoStack.pop();Object.assign(state,s);updateDisplay();playClick()}

// ============================================================
// PERSISTENCE
// ============================================================
function saveState(){
  try{localStorage.setItem('megacalc_state',JSON.stringify({
    history:state.history.slice(-30),memory:state.memory,hasMemory:state.hasMemory,
    currentTheme:state.currentTheme,mascotIndex:state.mascotIndex,soundEnabled:state.soundEnabled,
    currentMode:state.currentMode,currentTab:state.currentTab
  }))}catch(e){}
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem('megacalc_state'));
    if(d){
      if(d.history)state.history=d.history;
      if(d.memory!==undefined)state.memory=d.memory;
      if(d.hasMemory!==undefined)state.hasMemory=d.hasMemory;
      if(d.currentTheme)switchTheme(d.currentTheme,true);
      if(d.mascotIndex!==undefined)state.mascotIndex=d.mascotIndex;
      if(d.soundEnabled!==undefined)state.soundEnabled=d.soundEnabled;
      if(d.currentMode)switchMode(d.currentMode,true);
      if(d.currentTab)switchTab(d.currentTab,true);
    }
  }catch(e){}
}

// ============================================================
// THEMES
// ============================================================
function switchTheme(theme,silent){
  document.body.classList.remove(...THEMES.map(t=>'theme-'+t));
  if(theme!=='default')document.body.classList.add('theme-'+theme);
  state.currentTheme=theme;
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===theme));
  document.getElementById('moon').style.display=theme==='light'?'none':'block';
  if(!silent){playClick();saveState()}
}

// ============================================================
// MASCOT
// ============================================================
function setMascot(idx){
  state.mascotIndex=idx;
  document.getElementById('mascot').textContent=MASCOTS[idx];
  saveState();
}
function mascotReact(emoji){
  const el=document.getElementById('mascot');
  el.textContent=emoji;
  setTimeout(()=>el.textContent=MASCOTS[state.mascotIndex],1200);
}
function mascotDance(){
  const el=document.getElementById('mascot');
  el.classList.remove('dance');void el.offsetWidth;el.classList.add('dance');
}

// ============================================================
// CONFETTI
// ============================================================
function fireConfetti(count=25){
  const c=document.getElementById('confettiContainer');
  const colors=[getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#00ff88','#80d8ff','#c792ea','#ffd700','#ffb7c5'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    const sz=3+Math.random()*6;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.left=Math.random()*100+'%';p.style.top='-10px';
    p.style.borderRadius=Math.random()>.5?'50%':'1px';
    p.style.setProperty('--c-dur',(1.5+Math.random()*2)+'s');
    p.style.setProperty('--c-delay',Math.random()*.4+'s');
    c.appendChild(p);setTimeout(()=>p.remove(),4000);
  }
}

// ============================================================
// EXPORT AS CODE
// ============================================================
function openExport(){
  const val=state.currentInput;
  const expr=state.expression||`${state.previousInput||'0'} ${state.operator||'?'} ${val}`;
  const overlay=document.getElementById('exportOverlay');
  overlay.classList.add('open');
  const ls=document.getElementById('langSelect');
  ls.innerHTML='';
  LANGUAGES.forEach((l,i)=>{
    const b=document.createElement('button');b.className='lang-btn'+(i===0?' active':'');b.textContent=l.name;
    b.onclick=()=>{ls.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateExportCode(l,expr,val)};
    ls.appendChild(b);
  });
  updateExportCode(LANGUAGES[0],expr,val);
}
function updateExportCode(lang,expr,val){
  const ta=document.getElementById('exportCode');
  let code='';
  if(lang.id==='js')code=`${lang.comment} ${expr}\nconst result = ${val};\nconsole.log(result);`;
  else if(lang.id==='py')code=`${lang.comment} ${expr}\nresult = ${val}\nprint(result)`;
  else if(lang.id==='rs')code=`${lang.comment} ${expr}\nfn main() {\n    let result = ${val};\n    println!("{}", result);\n}`;
  else if(lang.id==='java')code=`${lang.comment} ${expr}\npublic class Main {\n    public static void main(String[] args) {\n        double result = ${val};\n        System.out.println(result);\n    }\n}`;
  else if(lang.id==='cpp')code=`${lang.comment} ${expr}\n#include <iostream>\nint main() {\n    double result = ${val};\n    std::cout << result << std::endl;\n    return 0;\n}`;
  else if(lang.id==='go')code=`${lang.comment} ${expr}\npackage main\nimport "fmt"\nfunc main() {\n    result := ${val}\n    fmt.Println(result)\n}`;
  ta.value=code;
}
document.getElementById('exportCopy').onclick=()=>{navigator.clipboard.writeText(document.getElementById('exportCode').value).then(()=>{mascotReact('✅');setTimeout(()=>document.getElementById('exportOverlay').classList.remove('open'),500)})};
document.getElementById('exportClose').onclick=()=>document.getElementById('exportOverlay').classList.remove('open');

// ============================================================
// EXPRESSION PARSER (for expression editor / graph)
// ============================================================
function evaluateExpression(expr,xVal){
  let s=expr
    .replace(/π/gi,'Math.PI')
    .replace(/e(?![xp])/gi,'Math.E')
    .replace(/sin\(/gi,'Math.sin(')
    .replace(/cos\(/gi,'Math.cos(')
    .replace(/tan\(/gi,'Math.tan(')
    .replace(/log\(/gi,'Math.log10(')
    .replace(/ln\(/gi,'Math.log(')
    .replace(/sqrt\(/gi,'Math.sqrt(')
    .replace(/abs\(/gi,'Math.abs(')
    .replace(/floor\(/gi,'Math.floor(')
    .replace(/ceil\(/gi,'Math.ceil(')
    .replace(/round\(/gi,'Math.round(')
    .replace(/pow\(/gi,'Math.pow(')
    .replace(/\^/g,'**')
    .replace(/x/gi,'('+xVal+')')
    .replace(/π/gi,'Math.PI')
    ;
  try{return Function('"use strict";return ('+s+')')()}catch(e){return NaN}
}

// ============================================================
// GRAPHING
// ============================================================
let graphFunc=null;
function plotGraph(){
  const input=document.getElementById('graphInput');
  const canvas=document.getElementById('graphCanvas');
  const ctx=canvas.getContext('2d');
  const expr=input.value.trim();
  if(!expr)return;
  const W=canvas.width=canvas.clientWidth*2,H=canvas.height=160*2;
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let i=0;i<=20;i++){const x=i*W/20;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let i=0;i<=10;i++){const y=i*H/10;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // Axes
  const cx=W/2,cy=H/2;
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  // Plot
  const xMin=-10,xMax=10,yMin=-10,yMax=10;
  const sx=W/(xMax-xMin),sy=H/(yMax-yMin);
  ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#00ff88';
  ctx.lineWidth=2.5;ctx.beginPath();let started=false;
  for(let px=0;px<=W;px++){
    const x=xMin+px/sx;
    const y=evaluateExpression(expr,x);
    const py=cy-y*sy;
    if(isFinite(y)){if(!started){ctx.moveTo(px,py);started=true}else ctx.lineTo(px,py)}
    else started=false;
  }
  ctx.stroke();
  // Labels
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='10px Fira Code';ctx.textAlign='center';
  ctx.fillText('f(x) = '+expr,W/2,18);
  playClick();
}

// ============================================================
// UNIT CONVERTER
// ============================================================
const CONV_UNITS={
  length:{m:1,km:1000,cm:.01,mm:.001,mi:1609.34,ft:.3048,in:.0254,yd:.9144},
  weight:{kg:1,g:.001,lb:.453592,oz:.0283495,t:1000,mg:.000001},
  temp:{c:'c',f:'f',k:'k'},
  currency:{usd:1,eur:1.08,gpb:1.31,jpy:.0066,inr:.012,cny:.14,krw:.00075}
};
function buildConverter(){
  const panel=document.getElementById('converterPanel');
  panel.innerHTML=`
    <div class="converter-type">
      <select id="convType" style="font-size:10px;padding:4px 8px;margin-bottom:6px">
        <option value="length">📏 Length</option>
        <option value="weight">⚖️ Weight</option>
        <option value="temp">🌡️ Temperature</option>
        <option value="currency">💰 Currency</option>
      </select>
    </div>
    <div class="converter-grid">
      <input id="convFrom" type="number" value="1" step="any">
      <button class="swap-btn" id="convSwap">⇄</button>
      <input id="convTo" type="number" readonly>
    </div>
    <div class="converter-grid" style="margin-top:4px">
      <select id="convFromUnit"></select>
      <div></div>
      <select id="convToUnit"></select>
    </div>
  `;
  const typeSel=panel.querySelector('#convType');
  const fromInp=panel.querySelector('#convFrom');
  const toInp=panel.querySelector('#convTo');
  const fromUnit=panel.querySelector('#convFromUnit');
  const toUnit=panel.querySelector('#convToUnit');
  const swapBtn=panel.querySelector('#convSwap');

  function populateUnits(type){
    const units=CONV_UNITS[type];
    if(!units)return;
    const keys=Object.keys(units);
    fromUnit.innerHTML=keys.map(k=>`<option value="${k}">${k}</option>`).join('');
    toUnit.innerHTML=keys.map(k=>`<option value="${k}">${k}</option>`).join('');
    if(keys.length>1){toUnit.selectedIndex=1}
    convert();
  }

  function convert(){
    const type=typeSel.value;
    const units=CONV_UNITS[type];
    const from=fromUnit.value,to=toUnit.value;
    const val=parseFloat(fromInp.value)||0;
    if(type==='temp'){
      const f=from, t=to, v=val;
      let c;
      if(f==='c')c=v;else if(f==='f')c=(v-32)*5/9;else c=v-273.15;
      let r;
      if(t==='c')r=c;else if(t==='f')r=c*9/5+32;else r=c+273.15;
      toInp.value=isFinite(r)?parseFloat(r.toFixed(6)):'?';
    } else {
      const base=val*units[from];
      const result=base/units[to];
      toInp.value=isFinite(result)?parseFloat(result.toFixed(6)):'?';
    }
  }

  typeSel.onchange=()=>{populateUnits(typeSel.value);playClick()};
  fromInp.oninput=convert;
  fromUnit.onchange=convert;
  toUnit.onchange=convert;
  swapBtn.onclick=()=>{const t=fromUnit.value;fromUnit.value=toUnit.value;toUnit.value=t;convert();playClick()};

  populateUnits('length');
}

// ============================================================
// DISPLAY UPDATE
// ============================================================
function syntaxHighlight(val){
  if(val==='Error')return `<span style="color:var(--accent)">Error</span>`;
  if(state.currentMode==='hex')return `<span style="color:#ffd700">${val}</span>`;
  if(state.currentMode==='bin')return `<span style="color:var(--num-color)">${val}</span>`;
  if(val.includes('.'))return `<span style="color:var(--accent2)">${val}</span>`;
  if(val.length>6)return `<span style="color:var(--accent)">${val}</span>`;
  return `<span style="color:var(--num-color)">${val}</span>`;
}

function updateDisplay(animate){
  const r=document.getElementById('result');
  r.innerHTML=syntaxHighlight(state.currentInput)+'<span class="terminal-cursor"></span>';
  document.getElementById('expression').textContent=state.expression||'_';
  if(animate){r.classList.remove('pop');void r.offsetWidth;r.classList.add('pop')}
  document.querySelectorAll('.btn-memory').forEach(b=>b.classList.toggle('has-memory',state.hasMemory));
  document.getElementById('modeDisplay').textContent=state.currentMode.toUpperCase();
}

// ============================================================
// MODE SWITCHING
// ============================================================
function convertToMode(value,targetMode){
  const num=parseInt(value,10);if(isNaN(num))return '0';
  switch(targetMode){case'dec':return num.toString(10);case'hex':return '0x'+num.toString(16).toUpperCase();case'bin':return '0b'+num.toString(2);default:return value}
}
function convertFromMode(value,sourceMode){
  if(sourceMode==='dec')return value;
  let str=value.replace(/^0x/i,'').replace(/^0b/i,'');
  const base=sourceMode==='hex'?16:2;
  const num=parseInt(str,base);if(isNaN(num))return '0';
  return num.toString(10);
}

  if(newMode===state.currentMode&&!silent)return;

// ============================================================
// SCIENTIFIC FUNCTIONS
// ============================================================
function applyFunction(fn){
  const val=parseFloat(convertFromMode(state.currentInput,state.currentMode))||0;
  let result;
  switch(fn){
    case'sin':result=Math.sin(val);break;
    case'cos':result=Math.cos(val);break;
    case'tan':result=Math.tan(val);break;
    case'log':result=val>0?Math.log10(val):'Error';break;
    case'ln':result=val>0?Math.log(val):'Error';break;
    case'sqrt':result=val>=0?Math.sqrt(val):'Error';break;
    case'sq':result=val*val;break;
    case'fact':
      if(val<0||!Number.isInteger(val)||val>170){result='Error';break}
      result=1;for(let i=2;i<=val;i++)result*=i;
      break;
    default:return;
  }
  if(result==='Error'){state.currentInput='Error';state.expression='';state.operator=null;state.shouldReset=true;updateDisplay();return}
  const decResult=result.toString();
  state.currentInput=state.currentMode==='dec'?decResult:convertToMode(decResult,state.currentMode);
  state.expression=`${fn}(${state.previousInput||val})`;
  state.shouldReset=true;updateDisplay(true);
}

function insertConstant(name){
  const val=name==='pi'?Math.PI:Math.E;
  const str=val.toString();
  state.currentInput=state.currentMode==='dec'?str:convertToMode(str,state.currentMode);
  state.shouldReset=true;updateDisplay(true);
}

// ============================================================
// BITWISE (Programmer mode)
// ============================================================
function bitwiseOp(op){
  pushUndo();
  const a=parseInt(convertFromMode(state.previousInput||state.currentInput,state.currentMode))||0;
  const b=parseInt(convertFromMode(state.currentInput,state.currentMode))||0;
  let result;
  switch(op){
    case'&':result=a&b;break;
    case'|':result=a|b;break;
    case'^':result=a^b;break;
    case'<<':result=a<<(b||1);break;
    case'>>':result=a>>(b||1);break;
    case'~':result=~a;break;
    default:return;
  }
  const decResult=result.toString();
  state.currentInput=state.currentMode==='dec'?decResult:convertToMode(decResult,state.currentMode);
  state.expression=`${a} ${op} ${b} =`;
  state.operator=null;state.shouldReset=true;updateDisplay(true);
  if(state.previousInput)addHistory(`${a} ${op} ${b}`,state.currentInput);
  state.previousInput='';
}

// ============================================================
// CORE LOGIC
// ============================================================
function appendNumber(num){
  pushUndo();
  if(state.shouldReset){state.currentInput='';state.shouldReset=false}
  if(state.currentMode==='hex'&&'0123456789ABCDEFabcdef'.includes(num)){
    if(state.currentInput==='0'||state.currentInput==='0x')state.currentInput='0x'+num.toUpperCase();
    else state.currentInput+=num.toUpperCase();
  } else if(state.currentMode==='bin'&&(num==='0'||num==='1')){
    if(state.currentInput==='0'||state.currentInput==='0b')state.currentInput='0b'+num;
    else state.currentInput+=num;
  } else if(state.currentMode==='dec'&&/^\d$/.test(num)){
    if(state.currentInput==='0'&&num!=='.')state.currentInput=num;
    else state.currentInput+=num;
  } else if(state.currentMode==='dec'){return}
  updateDisplay(true);
}
function appendDecimal(){
  if(state.currentMode!=='dec')return;
  pushUndo();
  if(state.shouldReset){state.currentInput='0';state.shouldReset=false}
  if(!state.currentInput.includes('.'))state.currentInput+='.';
  updateDisplay(true);
}
function appendOperator(op){
  pushUndo();
  if(state.operator&&!state.shouldReset)calculate(true);
  document.querySelectorAll('.btn-operator').forEach(b=>b.classList.remove('active'));
  const ab=document.querySelector(`.btn-operator[data-value="${op}"]`);
  if(ab)ab.classList.add('active');
  state.previousInput=state.currentInput;state.operator=op;
  state.expression=`${state.previousInput} ${getOpSymbol(op)} `;
  state.shouldReset=true;updateDisplay();
}
function getOpSymbol(op){const m={'+':'+','-':'−','*':'×','/':'÷','%':'%'};return m[op]||op}
function calculate(chain){
  if(!state.operator)return;
  const a=parseFloat(convertFromMode(state.previousInput,state.currentMode));
  const b=parseFloat(convertFromMode(state.currentInput,state.currentMode));
  let result;
  switch(state.operator){
    case'+':result=a+b;break;case'-':result=a-b;break;
    case'*':result=a*b;break;case'/':result=b!==0?a/b:'Error';break;
    case'%':result=a%b;break;default:return;
  }
  document.querySelectorAll('.btn-operator').forEach(b=>b.classList.remove('active'));
  if(result==='Error'){state.currentInput='Error';state.expression='';state.operator=null;state.shouldReset=true;document.getElementById('display').classList.add('shake');playError();setTimeout(()=>document.getElementById('display').classList.remove('shake'),400);updateDisplay();return}
  const rs=result.toString();
  const mr=state.currentMode==='dec'?rs:convertToMode(rs,state.currentMode);
  if(!chain){
    const ex=`${state.previousInput} ${getOpSymbol(state.operator)} ${state.currentInput}`;
    state.currentInput=mr;state.expression=ex+' =';
    addHistory(ex,state.currentInput);state.operator=null;state.shouldReset=true;
    updateDisplay(true);mascotDance();mascotReact('✨');
  } else {state.currentInput=mr;updateDisplay(true)}
}
function clearAll(){
  pushUndo();
  state.currentInput='0';state.previousInput='';state.operator=null;state.shouldReset=false;state.expression='';
  document.querySelectorAll('.btn-operator').forEach(b=>b.classList.remove('active'));
  updateDisplay();
}
function toggleSign(){
  pushUndo();
  if(state.currentInput.replace(/^0x|^0b/,'')!=='0'&&state.currentInput!=='0x0'&&state.currentInput!=='0b0'){
    state.currentInput=state.currentInput.startsWith('-')?state.currentInput.slice(1):'-'+state.currentInput;
    updateDisplay(true);
  }
}
function backspace(){
  pushUndo();if(state.shouldReset)return;
  if(state.currentInput.length>1){
    if((state.currentMode==='hex'&&state.currentInput==='0x')||(state.currentMode==='bin'&&state.currentInput==='0b'))return;
    state.currentInput=state.currentInput.slice(0,-1);
    if(state.currentMode==='hex'&&state.currentInput==='0x')state.currentInput='0x0';
    if(state.currentMode==='bin'&&state.currentInput==='0b')state.currentInput='0b0';
  } else{if(state.currentMode==='hex')state.currentInput='0x0';else if(state.currentMode==='bin')state.currentInput='0b0';else state.currentInput='0'}
  updateDisplay(true);
}

  const chars='0123456789ABCDEF';

    s.textContent=chars[Math.floor(Math.random()*16)];
    s.style.cssText=`position:absolute;font-family:Fira Code,monospace;font-size:${10+Math.random()*8}px;font-weight:700;color:var(--accent);text-shadow:0 0 8px rgba(0,0,0,.3);animation:hexBurst .8s ease-out forwards;animation-delay:${Math.random()*.1}s`;
    s.style.setProperty('--hx',Math.cos(a)*d+'px');s.style.setProperty('--hy',Math.sin(a)*d+'px');

}

// ============================================================
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(e.ctrlKey&&k==='z'){e.preventDefault();e.shiftKey?redo():undo();return}
  if(k>='0'&&k<='9'){const b=document.querySelector(`#buttonsContainer button[data-value="${k}"]`);if(b)b.click()}
  else if(/^[a-fA-F]$/.test(k)&&state.currentMode==='hex'){const b=document.querySelector(`#buttonsContainer button[data-value="${k.toUpperCase()}"]`);if(b)b.click();else{appendNumber(k.toUpperCase());playClick()}}
  else if(k==='.'){const b=document.querySelector('[data-action="decimal"]');if(b)b.click()}
  else if(['+','-','*','/'].includes(k)){const b=document.querySelector(`button[data-action="operator"][data-value="${k}"]`);if(b)b.click()}
  else if(k==='%'){const b=document.querySelector('[data-action="percent"]');if(b)b.click()}
  else if(k==='Enter'||k==='='){e.preventDefault();const b=document.querySelector('[data-action="equals"]');if(b)b.click()}
  else if(k==='Backspace'){const b=document.querySelector('[data-action="backspace"]');if(b)b.click()}
  else if(k==='Escape'){const b=document.querySelector('[data-action="clear"]');if(b)b.click()}
});

// ============================================================
// HAPTIC
// ============================================================
if(navigator.vibrate){document.addEventListener('click',e=>{if(e.target.closest('button'))navigator.vibrate?.(3)})}

// ============================================================
// INIT
// ============================================================
function init(){
  // Theme picker
  const tp=document.getElementById('themePicker');
  THEMES.forEach(t=>{const d=document.createElement('div');d.className='theme-dot'+(t==='default'?' active':'');d.dataset.theme=t;d.style.background=THEME_LABELS[t];d.title=t;d.onclick=()=>switchTheme(t);tp.appendChild(d)});

  // Tabs
  const tabsEl=document.getElementById('tabs');
  TABS.forEach(t=>{const b=document.createElement('button');b.className='tab-btn'+(t.id==='basic'?' active':'');b.dataset.tab=t.id;b.textContent=t.label;b.onclick=()=>switchTab(t.id);tabsEl.appendChild(b)});

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>switchMode(b.dataset.mode));

  // History
  const ht=document.getElementById('historyToggle');
  ht.innerHTML='<span class="icon">▾</span> // history.log <span class="history-clear" id="historyClear" style="display:none">clear</span>';
  const hc=document.getElementById('historyClear');
  if(hc)hc.onclick=function(e){e.stopPropagation();state.history=[];renderHistory();saveState();playClick()};
  ht.onclick=function(){state.historyOpen=!state.historyOpen;document.getElementById('historyPanel').classList.toggle('open',state.historyOpen);this.classList.toggle('open',state.historyOpen);playClick()};

  // Graph
  document.getElementById('graphBtn').onclick=()=>{if(document.getElementById('graphInput').value.trim()){plotGraph();playClick()}};
  document.getElementById('graphInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();plotGraph();playClick()}});

  // Converter
  buildConverter();

  // Mascot click
  document.getElementById('mascot').onclick=function(){state.mascotIndex=(state.mascotIndex+1)%MASCOTS.length;this.textContent=MASCOTS[state.mascotIndex];saveState();playClick()};

  // Export: add to status bar
  const sb=document.querySelector('.status-bar .mode');
  const expBtn=document.createElement('span');expBtn.textContent=' | 📤';expBtn.style.cursor='pointer';expBtn.style.opacity='.4';expBtn.style.marginLeft='4px';
  expBtn.onclick=()=>{openExport();playClick()};
  sb.appendChild(expBtn);

  // Load state
  loadState();

  // Build initial buttons
  buildButtons('basic');
  updateDisplay();
  renderHistory();
}

init();
</script>
</body>
</html>
